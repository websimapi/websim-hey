<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HEY! That's on Websim! — Audio Snippets</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="wrap">
    <h1>HEY! That's on Websim!</h1>
    <p class="sub">A set of quick voice stingers in different styles. Click to play, or press 1–9, 0 to trigger.</p>
    <div class="actions">
      <button id="btn-random" class="btn">Shuffle Play ▶︎</button>
      <button id="btn-stop" class="btn ghost">Stop ⏹</button>
    </div>
    <div id="composer" class="composer">
      <input id="video-file" type="file" accept="video/*" />
      <input id="intro-prompt" type="text" placeholder="Describe a striking intro scene..." />
      <input id="intro-seconds" type="number" min="1" max="10" step="1" value="2" title="Intro duration (s)" />
      <button id="btn-gen-intro" class="btn">Generate Intro Image</button>
      <button id="btn-compose" class="btn ghost" disabled>Compose + Download</button>
      <div id="intro-preview" class="intro-preview" aria-live="polite"></div>
      <p class="tiny">Tip: Click any audio card Play to set it as the intro audio.</p>
    </div>
  </header>

  <main class="wrap">
    <section id="grid" class="grid" aria-label="Audio variations">
      <!-- populated by script -->
    </section>
  </main>

  <footer class="wrap tiny">
    <p>Tip: Hover to preview. Click to play. Use the labeled keys to trigger.</p>
  </footer>
  <div id="voices-overlay" aria-hidden="true">
    <img src="voices_collage.png" alt="Collage of voices saying 'That's On Websim!'" />
  </div>
  <script type="module" src="script.js"></script>

</body>
</html>
